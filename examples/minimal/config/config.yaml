server:
  http:
    addr: ":8080"
  grpc:
    enabled: false
resilience:
  breaker:
    max_requests: 3
    consecutive_failures: 3
    interval: 60s
    timeout: 30s
  rate_limit:
    rps: 100
    burst: 200
logger:
  level: info
  format: text
  output: stderr
metrics:
  enabled: true
  path: /metrics
